<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Livelihoods Pulse · GenU MERL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F0F8FD;
  --surface:   #FFFFFF;
  --border:    #C8E6F5;
  --border-md: #7BCEF0;
  --text-1:    #002F5F;
  --text-2:    #2A5A7A;
  --text-3:    #6A9AB5;
  --accent:    #0054A1;
  --accent-bg: #E0F0FC;
  --accent-bd: #00AEEF;
  --star:      #D1A029;
  --star-bg:   #FDF6E3;
  --orange:    #E66C37;
  --red:       #C21E33;
  --lightblue: #00AEEF;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-serif:'DM Serif Display', Georgia, serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.6}
.page{max-width:780px;margin:0 auto;padding:2.5rem 1.5rem 4rem}

/* masthead */
.masthead{border-bottom:2px solid var(--accent);padding-bottom:1.25rem;margin-bottom:1.75rem}
.masthead-eyebrow{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.masthead-title{font-family:var(--font-serif);font-size:34px;color:var(--text-1);line-height:1.1;margin-bottom:0.4rem}
.masthead-title span{font-style:italic;color:var(--accent)}
.masthead-subtitle{font-family:var(--font-sans);font-style:italic;font-size:16px;color:var(--text-3);margin-bottom:1.25rem}

/* edition tabs */
.edition-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.75rem}
.tab{font-family:var(--font-sans);font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border-md);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-new{font-size:10px;background:#E0F0FC;color:var(--lightblue);border-radius:10px;padding:1px 6px;margin-left:4px;vertical-align:1px}

/* editorial */
.editorial{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:1.75rem;position:relative}
.editorial-label{font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.editorial-body{font-family:var(--font-sans);font-size:14px;color:var(--text-2);line-height:1.65}

/* stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px}
.stat-n{font-size:24px;font-weight:500;color:var(--text-1)}
.stat-l{font-size:11px;color:var(--text-3);margin-top:2px}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar-title{font-size:12px;font-weight:500;color:var(--text-3)}
.toolbar-right{display:flex;gap:6px;flex-shrink:0}
.btn{font-family:var(--font-sans);font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text-2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.12s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:0.9}

/* filters */
.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:1.5rem}
.filter-group{margin-bottom:10px}
.filter-group:last-child{margin-bottom:0}
.filter-group-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;transition:all 0.12s;font-family:var(--font-sans)}
.chip:hover{border-color:var(--border-md)}
.chip.on-type{background:#E0F0FC;color:#0054A1;border-color:#00AEEF}
.chip.on-country{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.chip.on-theme{background:var(--star-bg);color:var(--star);border-color:#E8C07A}
.chip.on-special{background:var(--star-bg);color:var(--star);border-color:#E8C07A}

/* section */
.section-head{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--lightblue);margin:1.5rem 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:8px;transition:border-color 0.15s}
.card:hover{border-color:var(--border-md)}
.card.dimmed{opacity:0.4}
.card-row{display:flex;gap:12px}
.card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:6px}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text-1);line-height:1.35;margin-bottom:3px}
.card-title a{color:var(--text-1);text-decoration:none}
.card-title a:hover{text-decoration:underline;color:var(--accent)}
.star-inline{color:var(--star);font-size:13px;vertical-align:1px;margin-left:3px}
.card-source{font-size:11px;color:var(--text-3);margin-bottom:9px}
.card-excerpt{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:10px}
.genu-block{border-left:2.5px solid var(--lightblue);padding:6px 0 6px 10px;margin-bottom:10px}
.genu-label{font-size:9px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--lightblue);margin-bottom:3px}
.genu-text{font-size:12px;color:var(--text-2);line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px}
.tag-flagship{background:#E0F0FC;color:#003D80}
.tag-trend{background:#FDF6E3;color:#8A5A00}
.tag-regional{background:#E0F0FC;color:#0054A1}
.tag-policy{background:#FCEAE0;color:#9A3010}
.tag-programme{background:#FCE8EC;color:#8A1525}
.tag-merl{background:#E0F0FC;color:#0054A1}
.tag-country{background:#E0F0FC;color:#00AEEF}
.tag-plain{background:#F1EFE8;color:#5F5E5A}
.card-actions{display:flex;gap:2px}
.act{background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px 5px;border-radius:var(--radius-sm);font-size:14px;line-height:1;transition:all 0.12s}
.act:hover{background:var(--bg);color:var(--text-2)}
.act.starred{color:var(--star)}
.act.read-done{color:var(--lightblue)}
.notes-toggle{font-size:11px;color:var(--text-3);cursor:pointer;background:none;border:none;padding:2px 0;margin-top:8px;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-sans)}
.notes-toggle:hover{color:var(--text-2)}
.notes-ta{width:100%;margin-top:6px;font-size:12px;font-family:var(--font-sans);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-1);resize:vertical;line-height:1.5}

/* add form */
.add-form{background:var(--surface);border:1px dashed var(--border-md);border-radius:var(--radius-lg);padding:18px 20px;margin-top:1.25rem}
.add-form-title{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:12px}
.form-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.form-row input,.form-row select,.form-row textarea{font-family:var(--font-sans);font-size:13px;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-1);outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;line-height:1.5}
.f-flex{flex:1;min-width:140px}
.f-full{width:100%}
.form-hint{font-size:11px;color:var(--text-3);margin-bottom:8px}

/* export */
.export-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-top:1rem}
.export-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.export-label{font-size:12px;font-weight:500;color:var(--text-2)}
.export-ta{width:100%;font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;color:var(--text-2);resize:vertical;line-height:1.6;min-height:200px}

.empty{padding:3rem;text-align:center;color:var(--text-3);font-size:14px}

@media(max-width:540px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .masthead-title{font-size:26px}
}
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('pulse-data').textContent);
const editionKeys = Object.keys(DATA.editions);
let currentEdition = DATA.latest;

const SECTIONS = [
  {id:'flagship',  label:'Flagship reports & global data'},
  {id:'trend',     label:'Trends & think pieces'},
  {id:'regional',  label:'Regional updates'},
  {id:'policy',    label:'Policy developments'},
  {id:'programme', label:'Programme highlights'},
  {id:'merl',      label:'MERL for youth livelihoods'},
];
const TYPE_META = {
  flagship:  {label:'Flagship report',     dot:'#0054A1', tag:'tag-flagship'},
  trend:     {label:'Trend / think piece', dot:'#D1A029', tag:'tag-trend'},
  regional:  {label:'Regional',            dot:'#00AEEF', tag:'tag-regional'},
  policy:    {label:'Policy',              dot:'#E66C37', tag:'tag-policy'},
  programme: {label:'Programme highlight', dot:'#C21E33', tag:'tag-programme'},
  merl:      {label:'MERL',               dot:'#0054A1', tag:'tag-merl'},
};

/* per-edition runtime state */
const state = {};
editionKeys.forEach(k => {
  state[k] = { fTypes: new Set(), fCountries: new Set(), fThemes: new Set(), fStarred: false, fUnread: false, reads: {} };
});

function S(){ return state[currentEdition]; }
function entries(){ return DATA.editions[currentEdition].entries; }

const allCountries = () => [...new Set(entries().flatMap(e=>e.countries))].sort();
const allThemes    = () => [...new Set(entries().flatMap(e=>e.themes))].sort();

function filtered(){
  const s = S();
  return entries().filter(e => {
    if(s.fTypes.size     && !s.fTypes.has(e.type))                       return false;
    if(s.fCountries.size && !e.countries.some(c=>s.fCountries.has(c)))   return false;
    if(s.fThemes.size    && !e.themes.some(t=>s.fThemes.has(t)))         return false;
    if(s.fStarred && !e.starred)  return false;
    if(s.fUnread  &&  s.reads[e.id]) return false;
    return true;
  });
}

function clearFilters(){
  const s=S(); s.fTypes.clear(); s.fCountries.clear(); s.fThemes.clear();
  s.fStarred=false; s.fUnread=false; render(true);
}
function toggle(setName, val){
  const s=S(); const set=s[setName];
  set.has(val)?set.delete(val):set.add(val); render();
}
function toggleStarred(){ S().fStarred=!S().fStarred; render(); }
function toggleUnread(){   S().fUnread=!S().fUnread;   render(); }
function toggleRead(id){
  const r=S().reads; r[id]=!r[id]; render();
}

/* tabs */
function renderTabs(){
  document.getElementById('edition-tabs').innerHTML = editionKeys.map((k,i) => {
    const isLatest = k === DATA.latest;
    const isActive = k === currentEdition;
    return `<button class="tab${isActive?' active':''}" onclick="switchEdition('${k}')">
      ${k}${isLatest?'<span class="tab-new">latest</span>':''}
    </button>`;
  }).join('');
}
function switchEdition(k){ currentEdition=k; render(true); }

/* editorial */
function renderEditorial(){
  document.getElementById('editorial-view').textContent = DATA.editions[currentEdition].editorial;
}

/* stats */
function renderStats(){
  const fe=filtered(); const all=entries(); const s=S();
  const unread=all.filter(e=>!s.reads[e.id]).length;
  const starred=all.filter(e=>e.starred).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Entries this edition</div></div>
    <div class="stat"><div class="stat-n">${fe.length}</div><div class="stat-l">Showing</div></div>
    <div class="stat"><div class="stat-n">${starred}</div><div class="stat-l">Must-reads</div></div>
    <div class="stat"><div class="stat-n">${unread}</div><div class="stat-l">Unread</div></div>
  `;
}

/* chips */
function renderChips(){
  const s=S();
  document.getElementById('type-chips').innerHTML =
    Object.keys(TYPE_META).map(k=>`<button class="chip${s.fTypes.has(k)?' on-type':''}" onclick="toggle('fTypes','${k}')">${TYPE_META[k].label}</button>`).join('')
    +`<button class="chip${s.fStarred?' on-special':''}" onclick="toggleStarred()">Must-reads only</button>`
    +`<button class="chip${s.fUnread?' on-special':''}" onclick="toggleUnread()">Unread only</button>`;

  document.getElementById('country-chips').innerHTML =
    allCountries().map(c=>`<button class="chip${s.fCountries.has(c)?' on-country':''}" onclick="toggle('fCountries','${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');

  document.getElementById('theme-chips').innerHTML =
    allThemes().map(t=>`<button class="chip${s.fThemes.has(t)?' on-theme':''}" onclick="toggle('fThemes','${t.replace(/'/g,"\\'")}')">${t}</button>`).join('');
}

/* entries */
function renderEntries(){
  const fe=filtered(); const s=S();
  let html=''; let any=false;
  SECTIONS.forEach(sec=>{
    const se=fe.filter(e=>e.type===sec.id);
    if(!se.length) return;
    any=true;
    html+=`<div class="section-head">${sec.label}</div>`;
    se.forEach(e=>{
      const tm=TYPE_META[e.type];
      const isRead=!!s.reads[e.id];
      html+=`<div class="card${isRead?' dimmed':''}">
        <div class="card-row">
          <div class="card-dot" style="background:${tm.dot}"></div>
          <div class="card-body">
            <div class="card-title">
              ${e.url?`<a href="${e.url}" target="_blank" rel="noopener">${e.title}</a>`:e.title}
              ${e.starred?'<span class="star-inline">&#9733;</span>':''}
            </div>
            <div class="card-source">${e.source}</div>
            ${e.excerpt?`<div class="card-excerpt">${e.excerpt}</div>`:''}
            ${e.genu?`<div class="genu-block"><div class="genu-label">GenU relevance</div><div class="genu-text">${e.genu}</div></div>`:''}
            <div class="card-footer">
              <div class="tags">
                <span class="tag ${tm.tag}">${tm.label}</span>
                ${e.countries.map(c=>`<span class="tag tag-country">${c}</span>`).join('')}
                ${e.themes.slice(0,3).map(t=>`<span class="tag tag-plain">${t}</span>`).join('')}
                ${e.themes.length>3?`<span class="tag tag-plain">+${e.themes.length-3} more</span>`:''}
              </div>
              <div class="card-actions">
                <button class="act${isRead?' read-done':''}" onclick="toggleRead(${e.id})" title="${isRead?'Mark unread':'Mark as read'}">&#10003;</button>
              </div>
            </div>
            <button class="notes-toggle" onclick="toggleNotes(${e.id})">&#9998; ${document.getElementById('nt'+e.id)&&document.getElementById('nt'+e.id).value?'View notes':'Add notes'}</button>
            <textarea class="notes-ta" id="nt${e.id}" style="display:none" placeholder="Your annotations or key takeaways..." rows="2"></textarea>
          </div>
        </div>
      </div>`;
    });
  });
  if(!any) html=`<div class="empty">No entries match the current filters. <button class="btn" onclick="clearFilters()" style="margin-left:8px">Clear filters</button></div>`;
  document.getElementById('entries-wrap').innerHTML=html;
}

function toggleNotes(id){
  const el=document.getElementById('nt'+id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

/* export */
function toggleExport(){
  const w=document.getElementById('export-wrap');
  if(w.style.display!=='none'){w.style.display='none';return;}
  const ed=DATA.editions[currentEdition];
  const dash='─'.repeat(54);
  let txt=`YOUTH LIVELIHOODS PULSE — ${currentEdition}\nGenU MERL Team · Knowledge Monitoring\n${dash}\n\nEDITOR'S NOTE\n${ed.editorial}\n`;
  SECTIONS.forEach(sec=>{
    const se=ed.entries.filter(e=>e.type===sec.id);
    if(!se.length) return;
    txt+=`\n${dash}\n${sec.label.toUpperCase()}\n`;
    se.forEach(e=>{
      txt+=`\n${e.starred?'★ ':'  '}${e.title}\n   ${e.source}\n`;
      if(e.excerpt) txt+=`   ${e.excerpt}\n`;
      if(e.genu)    txt+=`   ▸ GenU relevance: ${e.genu}\n`;
      if(e.url)     txt+=`   ${e.url}\n`;
    });
  });
  document.getElementById('export-ta').value=txt;
  w.style.display='block';
}
function copyExport(){
  const ta=document.getElementById('export-ta');
  if(navigator.clipboard){
    navigator.clipboard.writeText(ta.value).then(()=>{
      const btn=document.querySelector('.export-head .btn');
      if(btn){const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1500);}
    });
  } else {
    ta.select(); document.execCommand('copy');
  }
}

function render(resetExport){
  renderTabs();
  renderEditorial();
  renderStats();
  renderChips();
  renderEntries();
  if(resetExport) document.getElementById('export-wrap').style.display='none';
}

render();
</script>
</body>
</html>
